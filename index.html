<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Storm — Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --surface2: #151b26;
    --border: rgba(255,255,255,0.06);
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #4a9eff;
    --accent2: #7b5ea7;
    --danger: #ff5757;
    --warm: #ffaa44;
    --cold: #44ccff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Atmospheric background */
  .atmosphere {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .atm-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    transition: all 2s ease;
  }

  .atm-blob.b1 { width: 600px; height: 600px; top: -200px; left: -200px; }
  .atm-blob.b2 { width: 400px; height: 400px; bottom: -100px; right: -100px; }
  .atm-blob.b3 { width: 300px; height: 300px; top: 40%; left: 50%; transform: translate(-50%,-50%); }

  /* Noise overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 520px;
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    color: var(--muted);
    font-style: italic;
  }

  .time-display {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 52px 14px 18px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
    letter-spacing: 0.05em;
  }

  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: rgba(74,158,255,0.3); box-shadow: 0 0 0 3px rgba(74,158,255,0.06); }

  .search-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .search-btn:hover { opacity: 0.85; }
  .search-btn:active { transform: translateY(-50%) scale(0.92); }

  /* Main weather card */
  .main-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease;
    display: none;
  }

  .main-card.visible { display: block; }

  .main-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .location-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .location-name {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .location-country {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .local-time {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: right;
  }

  .temp-row {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 8px;
  }

  .temp-main {
    font-family: 'DM Serif Display', serif;
    font-size: 88px;
    line-height: 1;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .temp-side {
    padding-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .temp-feels {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .temp-range {
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .condition-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .condition-icon { font-size: 22px; }

  .condition-text {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 11px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .stat-unit {
    font-size: 10px;
    color: var(--muted);
  }

  /* UV indicator */
  .uv-bar {
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #44ff88, #ffff44, #ff8844, #ff4444);
    margin-top: 4px;
    position: relative;
  }

  .uv-dot {
    position: absolute;
    top: -3px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: white;
    transform: translateX(-50%);
    transition: left 0.5s ease;
  }

  /* Forecast */
  .forecast-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    display: none;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .forecast-card.visible { display: block; }

  .section-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .forecast-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .forecast-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    gap: 12px;
    transition: border-color 0.2s;
  }

  .forecast-item:hover { border-color: rgba(74,158,255,0.2); }

  .forecast-day {
    font-size: 12px;
    color: var(--muted);
    width: 36px;
    letter-spacing: 0.05em;
  }

  .forecast-icon { font-size: 18px; width: 28px; text-align: center; }

  .forecast-desc {
    flex: 1;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .forecast-temps {
    display: flex;
    gap: 8px;
    font-size: 13px;
  }

  .f-high { color: var(--warm); }
  .f-low { color: var(--cold); }

  /* Hourly */
  .hourly-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    display: none;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  .hourly-card.visible { display: block; }

  .hourly-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .hourly-scroll::-webkit-scrollbar { display: none; }

  .hourly-item {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 70px;
    transition: border-color 0.2s;
  }

  .hourly-item:hover { border-color: rgba(74,158,255,0.2); }
  .hourly-item.now { border-color: rgba(74,158,255,0.4); background: rgba(74,158,255,0.05); }

  .hourly-time { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
  .hourly-icon { font-size: 20px; }
  .hourly-temp { font-size: 14px; font-weight: 500; }
  .hourly-rain { font-size: 9px; color: var(--cold); }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.15em;
    animation: pulse 1.5s infinite;
  }

  .loading.visible { display: block; }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(255,87,87,0.08);
    border: 1px solid rgba(255,87,87,0.2);
    border-radius: 14px;
    padding: 16px 20px;
    font-size: 12px;
    color: var(--danger);
    letter-spacing: 0.05em;
    text-align: center;
  }

  .error-msg.visible { display: block; }

  /* AQI badge */
  .aqi-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid;
  }

  /* Sunrise/sunset */
  .sun-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .sun-item {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sun-icon { font-size: 20px; }
  .sun-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .sun-time { font-size: 14px; font-weight: 500; letter-spacing: 0.05em; }

  /* Wind compass */
  .wind-compass {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid var(--muted);
    position: relative;
    vertical-align: middle;
    margin-left: 4px;
  }

  .wind-arrow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 8px;
    background: var(--accent);
    transform-origin: bottom center;
    margin-left: -1px;
    margin-top: -8px;
    border-radius: 1px;
    transition: transform 0.5s ease;
  }
</style>
</head>
<body>

<div class="atmosphere">
  <div class="atm-blob b1" id="blob1"></div>
  <div class="atm-blob b2" id="blob2"></div>
  <div class="atm-blob b3" id="blob3"></div>
</div>

<div class="container">
  <div class="app-header">
    <div class="app-title">storm.</div>
    <div class="time-display" id="clock"></div>
  </div>

  <div class="search-wrap">
    <input class="search-box" id="search-input" type="text" placeholder="search city..." autocomplete="off"/>
    <button class="search-btn" onclick="searchWeather()">→</button>
  </div>

  <div class="loading" id="loading">FETCHING ATMOSPHERE...</div>
  <div class="error-msg" id="error-msg"></div>

  <!-- Main Card -->
  <div class="main-card" id="main-card">
    <div class="location-row">
      <div>
        <div class="location-name" id="loc-name">—</div>
        <div class="location-country" id="loc-country">—</div>
      </div>
      <div class="local-time" id="local-time">—</div>
    </div>

    <div class="temp-row">
      <div class="temp-main" id="temp-main">—</div>
      <div class="temp-side">
        <div class="temp-feels" id="temp-feels">feels like —</div>
        <div class="temp-range" id="temp-range">— / —</div>
      </div>
    </div>

    <div class="condition-row">
      <span class="condition-icon" id="cond-icon">—</span>
      <span class="condition-text" id="cond-text">—</span>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="stat-humidity">—<span class="stat-unit">%</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="stat-wind">—<span class="stat-unit"> km/h</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="stat-pressure">—<span class="stat-unit"> mb</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="stat-vis">—<span class="stat-unit"> km</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">UV Index</div>
        <div class="stat-value" id="stat-uv">—</div>
        <div class="uv-bar"><div class="uv-dot" id="uv-dot"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Dew Point</div>
        <div class="stat-value" id="stat-dew">—<span class="stat-unit">°</span></div>
      </div>
    </div>

    <div class="sun-row">
      <div class="sun-item">
        <span class="sun-icon">🌅</span>
        <div><div class="sun-label">Sunrise</div><div class="sun-time" id="sunrise">—</div></div>
      </div>
      <div class="sun-item">
        <span class="sun-icon">🌇</span>
        <div><div class="sun-label">Sunset</div><div class="sun-time" id="sunset">—</div></div>
      </div>
    </div>
  </div>

  <!-- Hourly -->
  <div class="hourly-card" id="hourly-card">
    <div class="section-label">Hourly Forecast</div>
    <div class="hourly-scroll" id="hourly-list"></div>
  </div>

  <!-- Forecast -->
  <div class="forecast-card" id="forecast-card">
    <div class="section-label">7-Day Forecast</div>
    <div class="forecast-list" id="forecast-list"></div>
  </div>
</div>

<script>
const API_KEY = 'aff563e230b94f78a29145345262303';
const BASE = 'https://api.weatherapi.com/v1';

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// Search on Enter
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchWeather(); });

function getWeatherEmoji(code, isDay) {
  if (code === 1000) return isDay ? '☀️' : '🌙';
  if ([1003].includes(code)) return isDay ? '⛅' : '🌤';
  if ([1006, 1009].includes(code)) return '☁️';
  if ([1030, 1135, 1147].includes(code)) return '🌫️';
  if ([1063, 1150, 1153, 1180, 1183].includes(code)) return '🌦️';
  if ([1186, 1189, 1192, 1195, 1240, 1243, 1246].includes(code)) return '🌧️';
  if ([1066, 1210, 1213, 1216, 1219, 1222, 1225, 1255, 1258].includes(code)) return '❄️';
  if ([1069, 1072, 1168, 1171, 1198, 1201, 1204, 1207, 1249, 1252].includes(code)) return '🌨️';
  if ([1087, 1273, 1276, 1279, 1282].includes(code)) return '⛈️';
  return '🌡️';
}

function setAtmosphere(code, isDay) {
  const b1 = document.getElementById('blob1');
  const b2 = document.getElementById('blob2');
  const b3 = document.getElementById('blob3');

  // Clear
  b1.style.opacity = '0'; b2.style.opacity = '0'; b3.style.opacity = '0';

  setTimeout(() => {
    if (code === 1000 && isDay) {
      b1.style.background = '#ff8c00'; b1.style.opacity = '0.04';
      b2.style.background = '#ffd700'; b2.style.opacity = '0.03';
    } else if ([1063,1180,1183,1186,1189,1192,1195].includes(code)) {
      b1.style.background = '#1a3a6b'; b1.style.opacity = '0.15';
      b2.style.background = '#0d2040'; b2.style.opacity = '0.12';
      b3.style.background = '#2255aa'; b3.style.opacity = '0.08';
    } else if ([1066,1210,1213,1216,1219,1222,1225].includes(code)) {
      b1.style.background = '#aaccff'; b1.style.opacity = '0.05';
      b2.style.background = '#88aadd'; b2.style.opacity = '0.04';
    } else if ([1087,1273,1276].includes(code)) {
      b1.style.background = '#330055'; b1.style.opacity = '0.15';
      b2.style.background = '#550033'; b2.style.opacity = '0.1';
    } else {
      b1.style.background = '#1a2a3a'; b1.style.opacity = '0.1';
      b2.style.background = '#0a1a2a'; b2.style.opacity = '0.08';
    }
  }, 300);
}

async function searchWeather() {
  const city = document.getElementById('search-input').value.trim();
  if (!city) return;

  document.getElementById('loading').classList.add('visible');
  document.getElementById('error-msg').classList.remove('visible');
  document.getElementById('main-card').classList.remove('visible');
  document.getElementById('forecast-card').classList.remove('visible');
  document.getElementById('hourly-card').classList.remove('visible');

  try {
    const res = await fetch(`${BASE}/forecast.json?key=${API_KEY}&q=${encodeURIComponent(city)}&days=7&aqi=no&alerts=no`);
    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    renderWeather(data);
  } catch(err) {
    document.getElementById('loading').classList.remove('visible');
    const errEl = document.getElementById('error-msg');
    errEl.textContent = `⚠ ${err.message || 'City not found. Try again.'}`;
    errEl.classList.add('visible');
  }
}

function renderWeather(data) {
  const c = data.current;
  const loc = data.location;
  const fore = data.forecast.forecastday;

  const code = c.condition.code;
  const isDay = c.is_day;

  setAtmosphere(code, isDay);

  // Main card
  document.getElementById('loc-name').textContent = loc.name;
  document.getElementById('loc-country').textContent = `${loc.region ? loc.region + ', ' : ''}${loc.country}`;
  document.getElementById('local-time').innerHTML = loc.localtime.split(' ')[1] + '<br/>' + loc.localtime.split(' ')[0];
  document.getElementById('temp-main').textContent = Math.round(c.temp_c) + '°';
  document.getElementById('temp-feels').textContent = `feels like ${Math.round(c.feelslike_c)}°`;
  document.getElementById('temp-range').textContent = `${Math.round(fore[0].day.mintemp_c)}° / ${Math.round(fore[0].day.maxtemp_c)}°`;
  document.getElementById('cond-icon').textContent = getWeatherEmoji(code, isDay);
  document.getElementById('cond-text').textContent = c.condition.text;
  document.getElementById('stat-humidity').innerHTML = `${c.humidity}<span class="stat-unit">%</span>`;
  document.getElementById('stat-wind').innerHTML = `${Math.round(c.wind_kph)}<span class="stat-unit"> km/h</span>`;
  document.getElementById('stat-pressure').innerHTML = `${c.pressure_mb}<span class="stat-unit"> mb</span>`;
  document.getElementById('stat-vis').innerHTML = `${c.vis_km}<span class="stat-unit"> km</span>`;
  document.getElementById('stat-uv').textContent = c.uv;
  document.getElementById('stat-dew').innerHTML = `${Math.round(c.dewpoint_c)}<span class="stat-unit">°</span>`;

  // UV dot position
  const uvPct = Math.min(c.uv / 11 * 100, 100);
  document.getElementById('uv-dot').style.left = uvPct + '%';

  // Sunrise/sunset
  document.getElementById('sunrise').textContent = fore[0].astro.sunrise;
  document.getElementById('sunset').textContent = fore[0].astro.sunset;

  // Hourly
  const hourlyList = document.getElementById('hourly-list');
  hourlyList.innerHTML = '';
  const hours = fore[0].hour;
  const nowHour = new Date(loc.localtime).getHours();
  hours.forEach((h, i) => {
    const hEl = document.createElement('div');
    hEl.className = 'hourly-item' + (i === nowHour ? ' now' : '');
    const t = new Date(h.time).getHours();
    const label = i === nowHour ? 'NOW' : (t === 0 ? '12am' : t < 12 ? `${t}am` : t === 12 ? '12pm' : `${t-12}pm`);
    hEl.innerHTML = `<div class="hourly-time">${label}</div><div class="hourly-icon">${getWeatherEmoji(h.condition.code, h.is_day)}</div><div class="hourly-temp">${Math.round(h.temp_c)}°</div><div class="hourly-rain">${h.chance_of_rain > 0 ? h.chance_of_rain+'%' : ''}</div>`;
    hourlyList.appendChild(hEl);
  });

  // Forecast
  const fcList = document.getElementById('forecast-list');
  fcList.innerHTML = '';
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  fore.forEach((day, i) => {
    const d = new Date(day.date);
    const label = i === 0 ? 'Today' : i === 1 ? 'Tmrw' : days[d.getDay()];
    const el = document.createElement('div');
    el.className = 'forecast-item';
    el.innerHTML = `<span class="forecast-day">${label}</span><span class="forecast-icon">${getWeatherEmoji(day.day.condition.code, 1)}</span><span class="forecast-desc">${day.day.condition.text}</span><div class="forecast-temps"><span class="f-high">${Math.round(day.day.maxtemp_c)}°</span><span class="f-low">${Math.round(day.day.mintemp_c)}°</span></div>`;
    fcList.appendChild(el);
  });

  document.getElementById('loading').classList.remove('visible');
  document.getElementById('main-card').classList.add('visible');
  document.getElementById('hourly-card').classList.add('visible');
  document.getElementById('forecast-card').classList.add('visible');
}

// Load default city
window.addEventListener('load', () => {
  document.getElementById('search-input').value = 'Dhaka';
  searchWeather();
});
</script>
</body>
</html>
