<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Storm — Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --surface2: #151b26;
    --border: rgba(255,255,255,0.06);
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #4a9eff;
    --accent2: #7b5ea7;
    --danger: #ff5757;
    --warm: #ffaa44;
    --cold: #44ccff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 860px;
    padding: 32px 20px 80px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: var(--muted);
    font-style: italic;
  }

  .time-display { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

  /* Search */
  .search-wrap { position: relative; }

  .search-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 52px 14px 18px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
    letter-spacing: 0.05em;
  }

  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: rgba(74,158,255,0.3); box-shadow: 0 0 0 3px rgba(74,158,255,0.06); }

  .search-btn {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: white;
    transition: opacity 0.2s, transform 0.1s;
  }
  .search-btn:hover { opacity: 0.85; }
  .search-btn:active { transform: translateY(-50%) scale(0.92); }

  /* Autocomplete */
  .autocomplete-dropdown {
    position: absolute;
    top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface);
    border: 1px solid rgba(74,158,255,0.2);
    border-radius: 14px;
    overflow: hidden;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: dropDown 0.15s ease;
  }
  @keyframes dropDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .autocomplete-dropdown.visible { display: block; }

  .autocomplete-item {
    padding: 12px 18px; cursor: pointer;
    font-size: 13px; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active { background: rgba(74,158,255,0.08); color: var(--accent); }
  .ac-name { font-weight: 500; }
  .ac-region { font-size: 11px; color: var(--muted); margin-left: auto; letter-spacing: 0.06em; }
  .autocomplete-loading { padding: 14px 18px; font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-align: center; animation: pulse 1.5s infinite; }

  .status-bar { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-align: center; min-height: 16px; }

  .error-msg {
    display: none;
    background: rgba(255,87,87,0.08);
    border: 1px solid rgba(255,87,87,0.2);
    border-radius: 14px;
    padding: 14px 20px; font-size: 12px; color: var(--danger);
    letter-spacing: 0.05em; text-align: center;
  }
  .error-msg.visible { display: block; }

  /* Grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  /* City Card */
  .city-card {
    border-radius: 20px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.07);
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .card-top {
    padding: 28px 24px 24px;
    position: relative; overflow: hidden;
    min-height: 160px;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .card-top canvas { position: absolute; inset: 0; pointer-events: none; }
  .card-top-content { position: relative; z-index: 1; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }

  .card-city {
    font-size: 13px; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(255,255,255,0.75); font-weight: 500;
  }

  .card-remove {
    background: rgba(255,255,255,0.08); border: none;
    color: rgba(255,255,255,0.4);
    width: 26px; height: 26px; border-radius: 8px;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .card-remove:hover { background: rgba(255,87,87,0.2); color: #ff5757; }

  .card-temp-row { display: flex; align-items: flex-end; justify-content: space-between; }

  .card-temp {
    font-family: 'DM Serif Display', serif;
    font-size: 72px; line-height: 1;
    letter-spacing: -0.04em; color: white;
  }

  .card-right { text-align: right; padding-bottom: 8px; }
  .card-condition { font-size: 13px; color: rgba(255,255,255,0.75); letter-spacing: 0.04em; margin-bottom: 4px; }
  .card-feels { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.06em; }
  .card-time { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; margin-top: 2px; }

  .card-stats {
    display: flex;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .card-stat {
    flex: 1; padding: 10px 8px; text-align: center;
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  .card-stat:last-child { border-right: none; }
  .card-stat-label { font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3px; }
  .card-stat-value { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 500; }

  .card-forecast {
    display: grid; grid-template-columns: repeat(5, 1fr);
    background: rgba(0,0,0,0.35);
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .fc-day {
    padding: 12px 6px; text-align: center;
    border-right: 1px solid rgba(255,255,255,0.04);
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .fc-day:last-child { border-right: none; }
  .fc-name { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 0.12em; text-transform: uppercase; }
  .fc-icon { font-size: 16px; }
  .fc-hi { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 500; }
  .fc-rain { font-size: 9px; color: var(--cold); opacity: 0.7; min-height: 12px; }

  /* Skeleton */
  .card-skeleton { border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); animation: fadeUp 0.3s ease both; }
  .skeleton-top { height: 160px; background: var(--surface); position: relative; overflow: hidden; }
  .skeleton-top::after { content:''; position:absolute; inset:0; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent); animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
  .skeleton-bottom { height: 100px; background: rgba(14,17,24,0.9); }
  .skeleton-text { padding: 24px; display: flex; flex-direction: column; gap: 10px; }
  .skeleton-line { height: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); }

  /* Empty */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 12px; letter-spacing: 0.15em; display: flex; flex-direction: column; align-items: center; gap: 12px; grid-column: 1/-1; }
  .empty-icon { font-size: 40px; opacity: 0.3; }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* BG themes */
  .bg-clear-day   { background: linear-gradient(145deg,#1a3a5c 0%,#0d2035 60%,#050f1a 100%); }
  .bg-clear-night { background: linear-gradient(145deg,#05080f 0%,#080d1a 50%,#0a0e1f 100%); }
  .bg-cloudy      { background: linear-gradient(145deg,#1e2535 0%,#141924 60%,#0e1118 100%); }
  .bg-rain        { background: linear-gradient(145deg,#0d1f3a 0%,#091528 60%,#050d1a 100%); }
  .bg-snow        { background: linear-gradient(145deg,#1a2a3a 0%,#111e2a 60%,#0a1520 100%); }
  .bg-thunder     { background: linear-gradient(145deg,#1a0d2e 0%,#120820 60%,#080510 100%); }
  .bg-fog         { background: linear-gradient(145deg,#1e2535 0%,#161c26 60%,#0e1118 100%); }
  .bg-partly      { background: linear-gradient(145deg,#163050 0%,#0f2038 60%,#080f1e 100%); }
</style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <div class="app-title">storm.</div>
    <div class="time-display" id="clock"></div>
  </div>

  <div class="search-wrap">
    <input class="search-box" id="search-input" type="text" placeholder="search city..." autocomplete="off"/>
    <button class="search-btn" onclick="addCity()">→</button>
    <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
  </div>

  <div class="status-bar" id="status-bar"></div>
  <div class="error-msg" id="error-msg"></div>

  <div class="cards-grid" id="cards-grid">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🌤</div>
      <div>SEARCH A CITY TO BEGIN</div>
    </div>
  </div>
</div>

<script>
const API_KEY = 'aff563e230b94f78a29145345262303';
const BASE    = 'https://api.weatherapi.com/v1';

let autocompleteTimer = null;
let activeIndex = -1;
let suggestions = [];
let cityKeys = [];

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

const searchInput = document.getElementById('search-input');
const dropdown    = document.getElementById('autocomplete-dropdown');

searchInput.addEventListener('input', () => {
  const val = searchInput.value.trim();
  activeIndex = -1;
  clearTimeout(autocompleteTimer);
  if (val.length < 2) { hideDropdown(); return; }
  dropdown.innerHTML = '<div class="autocomplete-loading">SEARCHING...</div>';
  dropdown.classList.add('visible');
  autocompleteTimer = setTimeout(() => fetchSuggestions(val), 300);
});

searchInput.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); activeIndex = Math.min(activeIndex+1, items.length-1); updateActive(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); activeIndex = Math.max(activeIndex-1,-1); updateActive(items); }
  else if (e.key === 'Enter') {
    if (activeIndex >= 0 && suggestions[activeIndex]) selectSuggestion(suggestions[activeIndex]);
    else { hideDropdown(); addCity(); }
  } else if (e.key === 'Escape') hideDropdown();
});

function updateActive(items) { items.forEach((el,i) => el.classList.toggle('active', i === activeIndex)); }

async function fetchSuggestions(query) {
  try {
    const res  = await fetch(`${BASE}/search.json?key=${API_KEY}&q=${encodeURIComponent(query)}`);
    const data = await res.json();
    suggestions = data;
    if (!data.length) { dropdown.innerHTML = '<div class="autocomplete-loading">NO RESULTS</div>'; return; }
    dropdown.innerHTML = '';
    data.forEach((item) => {
      const el = document.createElement('div');
      el.className = 'autocomplete-item';
      el.innerHTML = `<span>📍</span><span class="ac-name">${item.name}</span><span class="ac-region">${item.region?item.region+', ':''}${item.country}</span>`;
      el.addEventListener('mousedown', e => { e.preventDefault(); selectSuggestion(item); });
      dropdown.appendChild(el);
    });
  } catch { hideDropdown(); }
}

function selectSuggestion(item) {
  searchInput.value = item.name;
  hideDropdown();
  addCity();
}

function hideDropdown() {
  dropdown.classList.remove('visible');
  dropdown.innerHTML = '';
  activeIndex = -1;
  suggestions = [];
}

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideDropdown(); });

async function addCity() {
  const city = searchInput.value.trim();
  if (!city) return;
  hideDropdown();

  const key = city.toLowerCase();
  if (cityKeys.includes(key)) { showError(`"${city}" is already on the board.`); return; }

  hideError();
  document.getElementById('empty-state')?.remove();

  const skeletonId = 'sk-' + Date.now();
  const skeleton = document.createElement('div');
  skeleton.className = 'card-skeleton';
  skeleton.id = skeletonId;
  skeleton.innerHTML = `<div class="skeleton-top"><div class="skeleton-text"><div class="skeleton-line" style="width:40%"></div><div class="skeleton-line" style="width:20%;height:40px;margin-top:8px;"></div></div></div><div class="skeleton-bottom"></div>`;
  document.getElementById('cards-grid').appendChild(skeleton);

  try {
    const res  = await fetch(`${BASE}/forecast.json?key=${API_KEY}&q=${encodeURIComponent(city)}&days=5&aqi=no&alerts=no`);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    skeleton.replaceWith(buildCard(data));
    cityKeys.push(data.location.name.toLowerCase());
    searchInput.value = '';
    document.getElementById('status-bar').textContent =
      `↻ updated at ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
  } catch(err) {
    skeleton.remove();
    showError(`⚠ ${err.message || 'City not found.'}`);
  }
}

function removeCity(cardId, key) {
  document.getElementById(cardId)?.remove();
  cityKeys = cityKeys.filter(k => k !== key);
  if (!document.getElementById('cards-grid').querySelector('.city-card')) {
    const empty = document.createElement('div');
    empty.className = 'empty-state'; empty.id = 'empty-state';
    empty.innerHTML = '<div class="empty-icon">🌤</div><div>SEARCH A CITY TO BEGIN</div>';
    document.getElementById('cards-grid').appendChild(empty);
  }
}

function buildCard(data) {
  const c    = data.current;
  const loc  = data.location;
  const fore = data.forecast.forecastday;
  const code = c.condition.code;
  const isDay = c.is_day;
  const cardId = 'card-' + Date.now() + Math.random().toString(36).slice(2);
  const key    = loc.name.toLowerCase();
  const bgClass = getBgClass(code, isDay);
  const emoji   = getWeatherEmoji(code, isDay);
  const days    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const needsStars = (code === 1000 && !isDay);

  const forecastHTML = fore.map((day, i) => {
    const d = new Date(day.date);
    const label = i === 0 ? 'Today' : days[d.getDay()];
    return `<div class="fc-day">
      <div class="fc-name">${label}</div>
      <div class="fc-icon">${getWeatherEmoji(day.day.condition.code,1)}</div>
      <div class="fc-hi">${Math.round(day.day.maxtemp_c)}°</div>
      <div class="fc-rain">${day.day.daily_chance_of_rain > 0 ? day.day.daily_chance_of_rain+'%' : ''}</div>
    </div>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'city-card';
  card.id = cardId;
  card.innerHTML = `
    <div class="card-top ${bgClass}">
      ${needsStars ? `<canvas id="stars-${cardId}"></canvas>` : ''}
      <div class="card-top-content">
        <div class="card-header">
          <div class="card-city">${loc.name}${loc.region ? ', '+loc.region : ''}</div>
          <button class="card-remove" onclick="removeCity('${cardId}','${key}')">✕</button>
        </div>
        <div class="card-temp-row">
          <div class="card-temp">${Math.round(c.temp_c)}°</div>
          <div class="card-right">
            <div class="card-condition">${emoji} ${c.condition.text}</div>
            <div class="card-feels">Feels like ${Math.round(c.feelslike_c)}°</div>
            <div class="card-time">${loc.localtime.split(' ')[1]} · ${loc.country}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-stats">
      <div class="card-stat"><div class="card-stat-label">Humidity</div><div class="card-stat-value">${c.humidity}%</div></div>
      <div class="card-stat"><div class="card-stat-label">Wind</div><div class="card-stat-value">${Math.round(c.wind_kph)} km/h</div></div>
      <div class="card-stat"><div class="card-stat-label">Pressure</div><div class="card-stat-value">${c.pressure_mb} mb</div></div>
      <div class="card-stat"><div class="card-stat-label">UV Index</div><div class="card-stat-value">${c.uv}</div></div>
    </div>
    <div class="card-forecast">${forecastHTML}</div>
  `;

  if (needsStars) setTimeout(() => drawStars('stars-'+cardId), 80);
  return card;
}

function drawStars(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const parent = canvas.parentElement;
  canvas.width = parent.offsetWidth;
  canvas.height = parent.offsetHeight;
  const ctx = canvas.getContext('2d');
  for (let i = 0; i < 90; i++) {
    const x = Math.random()*canvas.width, y = Math.random()*canvas.height;
    const r = Math.random()*1.3, a = Math.random()*0.7+0.1;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
  }
  const pts = [[0.25,0.2],[0.38,0.38],[0.32,0.6],[0.48,0.42],[0.58,0.22],[0.66,0.48],[0.55,0.65]]
    .map(([px,py]) => [px*canvas.width, py*canvas.height]);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.8;
  for (let i=0;i<pts.length-1;i++) { ctx.beginPath(); ctx.moveTo(pts[i][0],pts[i][1]); ctx.lineTo(pts[i+1][0],pts[i+1][1]); ctx.stroke(); }
  pts.forEach(([x,y]) => { ctx.beginPath(); ctx.arc(x,y,1.6,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill(); });
}

function getBgClass(code, isDay) {
  if ([1087,1273,1276,1279,1282].includes(code)) return 'bg-thunder';
  if ([1066,1210,1213,1216,1219,1222,1225,1255,1258].includes(code)) return 'bg-snow';
  if ([1063,1150,1153,1180,1183,1186,1189,1192,1195,1240,1243,1246,1069,1072,1168,1171,1198,1201,1204,1207,1249,1252].includes(code)) return 'bg-rain';
  if ([1030,1135,1147].includes(code)) return 'bg-fog';
  if ([1006,1009].includes(code)) return 'bg-cloudy';
  if ([1003].includes(code)) return 'bg-partly';
  if (code === 1000) return isDay ? 'bg-clear-day' : 'bg-clear-night';
  return 'bg-cloudy';
}

function getWeatherEmoji(code, isDay) {
  if (code === 1000) return isDay ? '☀️' : '🌙';
  if ([1003].includes(code)) return isDay ? '⛅' : '🌤';
  if ([1006,1009].includes(code)) return '☁️';
  if ([1030,1135,1147].includes(code)) return '🌫️';
  if ([1063,1150,1153,1180,1183].includes(code)) return '🌦️';
  if ([1186,1189,1192,1195,1240,1243,1246].includes(code)) return '🌧️';
  if ([1066,1210,1213,1216,1219,1222,1225,1255,1258].includes(code)) return '❄️';
  if ([1069,1072,1168,1171,1198,1201,1204,1207,1249,1252].includes(code)) return '🌨️';
  if ([1087,1273,1276,1279,1282].includes(code)) return '⛈️';
  return '🌡️';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 4000);
}
function hideError() { document.getElementById('error-msg').classList.remove('visible'); }

// Auto refresh every 10 mins
setInterval(async () => {
  const cards = document.querySelectorAll('.city-card');
  if (!cards.length) return;
  for (const card of cards) {
    const cityEl = card.querySelector('.card-city');
    if (!cityEl) continue;
    const cityName = cityEl.textContent.split(',')[0].trim();
    try {
      const res  = await fetch(`${BASE}/forecast.json?key=${API_KEY}&q=${encodeURIComponent(cityName)}&days=5&aqi=no&alerts=no`);
      const data = await res.json();
      if (data.error) continue;
      const newCard = buildCard(data);
      newCard.id = card.id;
      card.replaceWith(newCard);
    } catch {}
  }
  document.getElementById('status-bar').textContent =
    `↻ all cities updated at ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}, 10 * 60 * 1000);

// Load defaults
window.addEventListener('load', async () => {
  for (const city of ['Dhaka','Barishal','Jessore']) {
    searchInput.value = city;
    await addCity();
    await new Promise(r => setTimeout(r, 400));
  }
  searchInput.value = '';
});
</script>
</body>
